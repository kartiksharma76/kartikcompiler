# ==============================================
#  SERVER
# ==============================================
server.port=8080

# ==============================================
#  MYSQL DATABASE
# ==============================================
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.open-in-view=false

# ==============================================
#  NVIDIA NIM API
# ==============================================
nvidia.api.key=${NVIDIA_API_KEY}

# ==============================================
#  GOOGLE OAUTH2
# ==============================================
spring.security.oauth2.client.registration.google.client-id=${SPRING_SECURITY_OAUTH2_CLIENT_REGISTRATION_GOOGLE_CLIENT_ID}
spring.security.oauth2.client.registration.google.client-secret=${SPRING_SECURITY_OAUTH2_CLIENT_REGISTRATION_GOOGLE_CLIENT_SECRET}
spring.security.oauth2.client.registration.google.scope=email,profile
spring.security.oauth2.client.registration.google.redirect-uri=https://kartikcompiler.onrender.com/login/oauth2/code/google

# ==============================================
#  JWT CONFIG
# ==============================================
app.jwt.secret=${APP_JWT_SECRET}
app.jwt.expiration=86400000

# ==============================================
#  OAUTH2 REDIRECT URLS
# ==============================================
app.oauth2.success-redirect-url=https://kartikcompiler.onrender.com/compiler.html
app.oauth2.failure-redirect-url=https://kartikcompiler.onrender.com/login.html?error=oauth_failed

# ==============================================
#  CORS
# ==============================================
app.cors.allowed-origins=https://kartikcompiler.onrender.com,http://localhost:3000,http://localhost:8080

# ==============================================
#  CODE COMPILER CONFIG
# ==============================================
app.compiler.temp-dir=/tmp/kartik_compiler
app.compiler.timeout=10
app.compiler.max-output=50000

# ==============================================
#  LOGGING
# ==============================================
logging.level.com.kartik=INFO
logging.level.org.springframework.security=WARN
